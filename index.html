<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>부동산 폭등 폭락 시그널 추적기</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
        <style>
            :root { --blue: #3b82f6; --red: #ef4444; --dark: #0f172a; --gray: #f8fafc; }
            body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--gray); margin: 0; padding: 20px; color: var(--dark); }
            .container { max-width: 1200px; margin: 0 auto; }
            .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
            .download-group { display: flex; gap: 10px; }
            .btn-download { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
            .btn-download:hover { background: #059669; }
            .filter-panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; display: flex; gap: 40px; }
            .btn-group button { background: #f1f5f9; border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
            .btn-group button.active { background: var(--dark); color: white; }
            .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
            .chart-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); position: relative; min-height: 280px; }
            .chart-card h3 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
            .reset-loc { font-size: 0.7rem; color: var(--blue); cursor: pointer; border: 1px solid var(--blue); padding: 2px 8px; border-radius: 4px; display: none; }
            .list-panel { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
            .tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; }
            .tab-btn { font-size: 1.4rem; border: none; background: none; cursor: pointer; color: #cbd5e1; font-weight: 800; padding-bottom: 15px; }
            .tab-btn.active.down { color: var(--blue); border-bottom: 4px solid var(--blue); }
            .tab-btn.active.up { color: var(--red); border-bottom: 4px solid var(--red); }
            table { width: 100%; border-collapse: collapse; }
            th { text-align: left; padding: 15px; color: #94a3b8; font-size: 0.85rem; }
            td { padding: 20px 15px; border-bottom: 1px solid #f8fafc; }
            .price-tag { font-weight: 800; font-size: 1.1rem; }
            .drop { color: var(--blue); }
            .rise { color: var(--red); }
            .btn-map { background: #fee500; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
            .filter-info { background: #e0f2fe; color: #0369a1; padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; display: none; font-weight: bold; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1 style="font-size: 1.8rem; letter-spacing: -1px;">📡 부동산 폭등 폭락 시그널 <span style="color:#64748b; font-weight:400;">양극단 추적기</span></h1>
                <div class="download-group">
                    <button class="btn-download" onclick="downloadExcel()">📊 Excel 시트 저장</button>
                </div>
            </div>
            <div class="filter-panel">
                <div class="filter-group"><label style="display:block; font-size:0.8rem; font-weight:bold; color:#64748b; margin-bottom:10px;">📅 거래 기간</label>
                    <div class="btn-group">
                        <button class="active" onclick="setFilter('period', 0, this)">전체</button>
                        <button onclick="setFilter('period', 6, this)">6개월</button>
                        <button onclick="setFilter('period', 12, this)">1년</button>
                        <button onclick="setFilter('period', 24, this)">2년</button>
                    </div>
                </div>
                <div class="filter-group"><label style="display:block; font-size:0.8rem; font-weight:bold; color:#64748b; margin-bottom:10px;">💰 변동 금액</label>
                    <div class="btn-group">
                        <button class="active" onclick="setFilter('price', 0, this)">전체</button>
                        <button onclick="setFilter('price', 10000, this)">1억↑</button>
                        <button onclick="setFilter('price', 30000, this)">3억↑</button>
                        <button onclick="setFilter('price', 50000, this)">5억↑</button>
                    </div>
                </div>
            </div>
            <div class="chart-grid">
                <div class="chart-card"><h3>📈 시장 심리</h3><canvas id="ratioChart"></canvas></div>
                <div class="chart-card" style="grid-column:1/-1; min-height:420px;">
                    <h3>📍 지역별 빈도 <span id="resetLoc" class="reset-loc" onclick="resetLocFilter()">해제</span></h3>
                    <p style="font-size:0.95rem; color:#475569; margin-top:-10px; font-weight:500;">* 막대를 클릭하면 해당 지역만 필터링됩니다.</p>
                    <canvas id="locChart" height="160"></canvas>
                </div>
                <div class="chart-card"><h3>🏆 변동 TOP 10</h3><canvas id="topChart"></canvas></div>
                <!-- 추가 지표 행 -->
                <div class="chart-card" style="grid-column: 1/-1;">
                    <h3>📅 월별 폭락/폭등 건수 추이</h3>
                    <canvas id="monthlyChart" height="80"></canvas>
                </div>
                <div class="chart-card">
                    <h3>📉 지역별 평균 낙폭률 (%)</h3>
                    <canvas id="dropRateChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>🗺 지역별 낙폭 강도 (평균 억)</h3>
                    <canvas id="heatChart"></canvas>
                </div>
            </div>
            <div class="list-panel">
                <div id="filter-status" class="filter-info"></div>
                <div class="tabs">
                    <button class="tab-btn active down" onclick="setMode('down', this)">📉 하락 시그널</button>
                    <button class="tab-btn up" onclick="setMode('up', this)">🔥 상승 시그널</button>
                </div>
                <table id="main-table">
                    <thead><tr><th>거래일</th><th>지역/단지명</th><th>실거래가</th><th>변동액</th><th>액션</th></tr></thead>
                    <tbody id="list"></tbody>
                </table>
            </div>
        </div>
        <script>
            const client = supabase.createClient(
                "https://ofbtvvzpvuezfdirwhtd.supabase.co",
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mYnR2dnpwdnVlemZkaXJ3aHRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjY1MTYsImV4cCI6MjA5MjYwMjUxNn0.OLCpaSiQxs37dZC3P0QXxOTp4OKRYYApaF34b2UkOlA"
            );
            let rawData = []; let currentMode = 'down'; let filters = { period: 0, price: 0, loc: null }; let charts = {};

            async function init() {
                // 페이지네이션으로 전체 데이터 로드
                let all = [];
                let page = 0;
                const PAGE = 1000;
                while (true) {
                    const { data, error } = await client
                        .from('drop_results')
                        .select('*')
                        .order('listed_at', { ascending: false })
                        .range(page * PAGE, (page + 1) * PAGE - 1);
                    if (error || !data || data.length === 0) break;
                    all = all.concat(data);
                    if (data.length < PAGE) break;
                    page++;
                }
                // drop_amount 없으면 current_price - trade_price로 계산
                rawData = all.map(r => {
                    if (r.drop_amount == null && r.trade_price && r.current_price) {
                        r.drop_amount = r.current_price - r.trade_price;
                    }
                    return r;
                }).filter(r => r.drop_amount != null && r.drop_amount !== 0);

                render();
            }

            function setFilter(type, val, btn) {
                filters[type] = val;
                btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); render();
            }
            function setMode(m, btn) {
                currentMode = m;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); render();
            }
            function resetLocFilter() {
                filters.loc = null;
                document.getElementById('resetLoc').style.display = 'none';
                render();
            }

            function isDown(i) {
                // trade_price 있으면: 현재가 < 기준가 = 하락(급매)
                if (i.trade_price != null && i.trade_price > 0) return i.current_price < i.trade_price;
                // trade_price 없으면: 기존 폭락앱 방식 (음수 = 하락)
                return i.drop_amount < 0;
            }
            function isUp(i) {
                // trade_price 있으면: 현재가 > 기준가 = 상승
                if (i.trade_price != null && i.trade_price > 0) return i.current_price > i.trade_price;
                // trade_price 없으면: 기존 폭락앱 방식 (양수 = 상승)
                return i.drop_amount > 0;
            }
            function getFilteredData() {
                let filtered = rawData.filter(i => currentMode === 'up' ? isUp(i) : isDown(i));
                if (filters.loc) filtered = filtered.filter(i => i.loc_name === filters.loc);
                if (filters.period > 0) {
                    const cutoff = new Date();
                    cutoff.setMonth(cutoff.getMonth() - filters.period);
                    // listed_at 기준으로 필터
                    filtered = filtered.filter(i => getDate(i) && new Date(getDate(i)) >= cutoff);
                }
                if (filters.price > 0) filtered = filtered.filter(i => Math.abs(i.drop_amount) >= filters.price);
                return filtered.sort((a, b) => currentMode === 'up' ? b.drop_amount - a.drop_amount : a.drop_amount - b.drop_amount);
            }

            function fmtDate(val) {
                if (!val) return '-';
                return String(val).slice(0, 10);
            }
            function getDate(row) {
                return row.listed_at || row.deal_date || null;
            }

            function render() {
                const data = getFilteredData();
                updateCharts(data);
                const status = document.getElementById('filter-status');
                if (filters.loc) { status.style.display = 'block'; status.innerText = `📍 ${filters.loc} 시그널만 표시 중`; }
                else { status.style.display = 'none'; }
                document.getElementById('list').innerHTML = data.map(i => `
                    <tr>
                        <td style="color:#94a3b8; font-size:0.85rem;">${fmtDate(getDate(i))}</td>
                        <td>
                            <div style="font-size:0.75rem; color:#64748b;">${i.loc_name}</div>
                            <div style="font-weight:bold; font-size:1rem; cursor:pointer;"
                                 onclick="window.open('https://search.naver.com/search.naver?query=${encodeURIComponent(i.loc_name + ' ' + i.apt_name)}', '_blank')">
                                ${i.apt_name}
                            </div>
                        </td>
                        <td class="price-tag">${(i.current_price / 10000).toFixed(1)}억</td>
                        <td class="price-tag ${currentMode === 'up' ? 'rise' : 'drop'}">
                            ${isDown(i) ? '▼' : '▲'} ${(Math.abs(i.drop_amount) / 10000).toFixed(1)}억
                        </td>
                        <td><button class="btn-map"
                            onclick="window.open('https://map.kakao.com/?q=${encodeURIComponent(i.loc_name + ' ' + i.apt_name)}', '_blank')">MAP</button></td>
                    </tr>
                `).join('');
            }

            function downloadExcel() {
                const data = getFilteredData().map(i => ({
                    "거래일": fmtDate(getDate(i)),
                    "지역": i.loc_name,
                    "단지명": i.apt_name,
                    "실거래가(억)": (i.current_price / 10000).toFixed(2),
                    "변동액(억)": (i.drop_amount / 10000).toFixed(2)
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "시그널_리스트");
                XLSX.writeFile(wb, `부동산_시그널_${currentMode}_${new Date().toISOString().slice(0,10)}.xlsx`);
            }

            function updateCharts(data) {
                const ups = rawData.filter(i => isUp(i)).length;
                const downs = rawData.filter(i => isDown(i)).length;
                if (charts.ratio) charts.ratio.destroy();
                charts.ratio = new Chart(document.getElementById('ratioChart'), {
                    type: 'doughnut',
                    data: { labels: ['상승', '하락'], datasets: [{ data: [ups, downs], backgroundColor: ['#ef4444', '#3b82f6'], borderWidth: 0 }] },
                    options: { cutout: '75%' }
                });
                const locCounts = {};
                rawData.filter(i => currentMode === 'up' ? isUp(i) : isDown(i))
                       .forEach(i => locCounts[i.loc_name] = (locCounts[i.loc_name] || 0) + 1);
                if (charts.loc) charts.loc.destroy();
                charts.loc = new Chart(document.getElementById('locChart'), {
                    type: 'bar',
                    data: { labels: Object.keys(locCounts), datasets: [{ label: '시그널 건수', data: Object.values(locCounts), backgroundColor: '#1e293b', borderRadius: 8 }] },
                    options: {
                        onClick: (e, el) => {
                            if (el.length > 0) {
                                filters.loc = Object.keys(locCounts)[el[0].index];
                                document.getElementById('resetLoc').style.display = 'inline-block';
                                render();
                            }
                        },
                        plugins: { legend: { display: false } },
                        layout: { padding: { bottom: 20 } },
                        scales: {
                            x: {
                                ticks: {
                                    maxRotation: 90,
                                    minRotation: 90,
                                    font: { size: 11, weight: 'bold' },
                                    autoSkip: false,
                                    padding: 5
                                },
                                grid: { display: false }
                            },
                            y: { beginAtZero: true }
                        }
                    }
                });
                // 단지명 중복 제거 후 TOP10
                const seen = new Set();
                const sorted = [...data]
                    .sort((a, b) => Math.abs(b.drop_amount) - Math.abs(a.drop_amount))
                    .filter(i => { if (seen.has(i.apt_name)) return false; seen.add(i.apt_name); return true; })
                    .slice(0, 10);
                if (charts.top) charts.top.destroy();
                charts.top = new Chart(document.getElementById('topChart'), {
                    type: 'bar',
                    options: { indexAxis: 'y', plugins: { legend: { display: false } } },
                    data: {
                        labels: sorted.map(i => i.apt_name.substring(0, 6)),
                        datasets: [{ label: '억', data: sorted.map(i => Math.abs(i.drop_amount) / 10000), backgroundColor: '#64748b' }]
                    }
                });

                // 4. 월별 폭락/폭등 추이
                const monthDown = {}, monthUp = {};
                rawData.forEach(i => {
                    const m = fmtDate(i.listed_at).slice(0,7);
                    if (!m || m === '-') return;
                    if (isDown(i)) monthDown[m] = (monthDown[m]||0) + 1;
                    else if (isUp(i)) monthUp[m] = (monthUp[m]||0) + 1;
                });
                const allMonths = [...new Set([...Object.keys(monthDown), ...Object.keys(monthUp)])].sort();
                if (charts.monthly) charts.monthly.destroy();
                charts.monthly = new Chart(document.getElementById('monthlyChart'), {
                    type: 'bar',
                    data: {
                        labels: allMonths,
                        datasets: [
                            { label: '📉 폭락', data: allMonths.map(m => monthDown[m]||0), backgroundColor: '#3b82f6', borderRadius: 4 },
                            { label: '🔥 폭등', data: allMonths.map(m => monthUp[m]||0), backgroundColor: '#ef4444', borderRadius: 4 }
                        ]
                    },
                    options: { plugins: { legend: { position: 'top' } }, scales: { x: { stacked: false }, y: { beginAtZero: true } } }
                });

                // 5. 지역별 평균 낙폭률
                const locRate = {};
                rawData.filter(i => isDown(i) && i.current_price > 0).forEach(i => {
                    if (!locRate[i.loc_name]) locRate[i.loc_name] = { sum: 0, cnt: 0 };
                    locRate[i.loc_name].sum += Math.abs(i.drop_amount) / i.current_price * 100;
                    locRate[i.loc_name].cnt++;
                });
                const locRateLabels = Object.keys(locRate).sort((a,b) => locRate[b].sum/locRate[b].cnt - locRate[a].sum/locRate[a].cnt);
                const locRateData = locRateLabels.map(k => +(locRate[k].sum/locRate[k].cnt).toFixed(1));
                if (charts.dropRate) charts.dropRate.destroy();
                charts.dropRate = new Chart(document.getElementById('dropRateChart'), {
                    type: 'bar',
                    data: { labels: locRateLabels, datasets: [{ label: '평균 낙폭률(%)', data: locRateData, backgroundColor: locRateData.map(v => v > 15 ? '#ef4444' : v > 10 ? '#f97316' : '#3b82f6'), borderRadius: 6 }] },
                    options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
                });

                // 6. 지역별 낙폭 강도 (평균 억)
                const locAmt = {};
                rawData.filter(i => isDown(i)).forEach(i => {
                    if (!locAmt[i.loc_name]) locAmt[i.loc_name] = { sum: 0, cnt: 0 };
                    locAmt[i.loc_name].sum += Math.abs(i.drop_amount);
                    locAmt[i.loc_name].cnt++;
                });
                const locAmtLabels = Object.keys(locAmt).sort((a,b) => locAmt[b].sum/locAmt[b].cnt - locAmt[a].sum/locAmt[a].cnt);
                const locAmtData = locAmtLabels.map(k => +(locAmt[k].sum/locAmt[k].cnt/10000).toFixed(1));
                const maxAmt = Math.max(...locAmtData);
                if (charts.heat) charts.heat.destroy();
                charts.heat = new Chart(document.getElementById('heatChart'), {
                    type: 'bar',
                    data: { labels: locAmtLabels, datasets: [{ label: '평균 낙폭(억)', data: locAmtData, backgroundColor: locAmtData.map(v => `rgba(239,68,68,${(v/maxAmt*0.8+0.2).toFixed(2)})`), borderRadius: 6 }] },
                    options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
                });
            }
            init();
        </script>
    </body>
    </html>
