name: RealEstate-Auto-Update

on:
  schedule:
    - cron: '0 0 * * *' # 매일 아침 9시 (KST)
  workflow_dispatch: # 직접 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전 v4로 변경

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전 v5로 변경
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests pandas

      - name: Run script
        run: python main.py auto
