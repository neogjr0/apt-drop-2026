name: RealEstate-Auto-Update

on:
  schedule:
    - cron: '0 0 * * *' # 매일 아침 9시 (KST)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests pandas

      - name: Run script
        env:
          # 금고(Secrets)에서 세 가지 열쇠를 모두 꺼내서 파이썬에게 줍니다
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python main.py auto
