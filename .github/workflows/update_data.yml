name: RealEstate-Auto-Update

on:
  schedule:
    - cron: '0 0 * * *' # 매일 아침 9시 실행
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests pandas

      - name: Run script
        run: python main.py auto
